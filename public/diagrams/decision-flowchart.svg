<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 568" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:860px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
          <defs>
            <!-- 默认灰色箭头 -->
            <marker id="arr"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#555"/></marker>
            <!-- 蓝色 PV -->
            <marker id="arr-b" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#3b82f6"/></marker>
            <!-- 橙色 Beacon -->
            <marker id="arr-o" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#f59e0b"/></marker>
            <!-- 绿色 Click -->
            <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#3ecf8e"/></marker>
            <!-- 红色 Callback -->
            <marker id="arr-r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#f56565"/></marker>
          </defs>

          <!-- ═══ START ═══ -->
          <rect x="330" y="12" width="200" height="40" rx="20" fill="#7c6af7"/>
          <text x="430" y="37" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="14" font-weight="700">需要埋点</text>

          <!-- START → Q1 -->
          <line x1="430" y1="52" x2="430" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

          <!-- ═══ Q1 钻石：事件类型 ═══ -->
          <!-- center (430,130), half-w=105, half-h=42 -->
          <polygon points="430,88 535,130 430,172 325,130" fill="#16162a" stroke="#7c6af7" stroke-width="1.5"/>
          <text x="430" y="124" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="600">什么类型的事件？</text>
          <text x="430" y="142" text-anchor="middle" dominant-baseline="central" fill="#6b6b9a" font-size="10">区分上报场景</text>

          <!-- Q1 left → PV node  (左分支：进入页面) -->
          <line x1="325" y1="130" x2="174" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
          <text x="250" y="122" text-anchor="middle" fill="#60a5fa" font-size="10">进入页面</text>

          <!-- PV 节点 center(87,130) 174w×58h -->
          <rect x="0" y="101" width="174" height="58" rx="8" fill="#0e2340" stroke="#3b82f6" stroke-width="1.5"/>
          <text x="87" y="116" text-anchor="middle" dominant-baseline="central" fill="#93c5fd" font-size="11.5" font-weight="700">PV 上报</text>
          <text x="87" y="132" text-anchor="middle" dominant-baseline="central" fill="#60a5fa" font-size="9">setTrackerInfo()</text>
          <text x="87" y="147" text-anchor="middle" dominant-baseline="central" fill="#60a5fa" font-size="9">→ trackPageViewCollect()</text>

          <!-- Q1 right → Callback node (右分支：接口返回) -->
          <line x1="535" y1="130" x2="684" y2="130" stroke="#f56565" stroke-width="1.5" marker-end="url(#arr-r)"/>
          <text x="610" y="122" text-anchor="middle" fill="#fca5a5" font-size="10">接口返回</text>

          <!-- Callback 节点 center(771,130) 174w×58h -->
          <rect x="684" y="101" width="176" height="58" rx="8" fill="#2d1010" stroke="#f56565" stroke-width="1.5"/>
          <text x="772" y="116" text-anchor="middle" dominant-baseline="central" fill="#fca5a5" font-size="11.5" font-weight="700">Callback 上报</text>
          <text x="772" y="132" text-anchor="middle" dominant-baseline="central" fill="#f87171" font-size="9">trackCallbackCollect()</text>
          <text x="772" y="147" text-anchor="middle" dominant-baseline="central" fill="#f87171" font-size="9">ret_code + 业务字段</text>

          <!-- Q1 bottom → Q2  (用户点击) -->
          <line x1="430" y1="172" x2="430" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="442" y="196" dominant-baseline="central" fill="#666" font-size="10">用户点击元素</text>

          <!-- ═══ Q2 钻石：是否跳转 ═══ -->
          <!-- center (430,258), half-w=105, half-h=42 -->
          <polygon points="430,216 535,258 430,300 325,258" fill="#16162a" stroke="#7c6af7" stroke-width="1.5"/>
          <text x="430" y="252" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="600">点击后立即跳转页面？</text>
          <text x="430" y="270" text-anchor="middle" dominant-baseline="central" fill="#6b6b9a" font-size="10">路由 push / window.open</text>

          <!-- Q2 left → Beacon  (是，立即跳转) -->
          <line x1="325" y1="258" x2="174" y2="258" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-o)"/>
          <text x="250" y="249" text-anchor="middle" fill="#fbbf24" font-size="10">是，立即跳转</text>

          <!-- Beacon 节点 center(87,258) -->
          <rect x="0" y="229" width="174" height="58" rx="8" fill="#2a1700" stroke="#f59e0b" stroke-width="1.5"/>
          <text x="87" y="244" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-size="11.5" font-weight="700">Beacon 防丢点</text>
          <text x="87" y="260" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="9">trackClickBeconCollect()</text>
          <text x="87" y="275" text-anchor="middle" dominant-baseline="central" fill="#fcd34d" font-size="9">sendBeacon 保证不丢点</text>

          <!-- Q2 bottom → Q3 (否，留在当前页) -->
          <line x1="430" y1="300" x2="430" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="442" y="324" dominant-baseline="central" fill="#666" font-size="10">否，留在当前页</text>

          <!-- ═══ Q3 钻石：有无业务逻辑 ═══ -->
          <!-- center (430,386), half-w=105, half-h=42 -->
          <polygon points="430,344 535,386 430,428 325,386" fill="#16162a" stroke="#7c6af7" stroke-width="1.5"/>
          <text x="430" y="380" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="600">模板有额外业务逻辑？</text>
          <text x="430" y="398" text-anchor="middle" dominant-baseline="central" fill="#6b6b9a" font-size="10">条件判断 / 动态传参</text>

          <!-- Q3 left → v-tracker  (无，纯上报) -->
          <line x1="325" y1="386" x2="174" y2="386" stroke="#3ecf8e" stroke-width="1.5" marker-end="url(#arr-g)"/>
          <text x="250" y="377" text-anchor="middle" fill="#6ee7b7" font-size="10">无，纯上报</text>

          <!-- v-tracker 节点 center(87,386) -->
          <rect x="0" y="357" width="174" height="58" rx="8" fill="#071e14" stroke="#3ecf8e" stroke-width="1.5"/>
          <text x="87" y="372" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="11.5" font-weight="700">v-tracker 指令</text>
          <text x="87" y="388" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">声明式绑定 click 事件</text>
          <text x="87" y="403" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">→ trackClickCollect()</text>

          <!-- Q3 bottom → Q4 (有业务逻辑) -->
          <line x1="430" y1="428" x2="430" y2="472" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="442" y="452" dominant-baseline="central" fill="#666" font-size="10">有业务逻辑</text>

          <!-- ═══ Q4 钻石：元素类型 ═══ -->
          <!-- center (430,510), half-w=95, half-h=38 -->
          <polygon points="430,472 525,510 430,548 335,510" fill="#16162a" stroke="#7c6af7" stroke-width="1.5"/>
          <text x="430" y="505" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="600">元素类型？</text>
          <text x="430" y="521" text-anchor="middle" dominant-baseline="central" fill="#6b6b9a" font-size="10">button 还是 a 链接</text>

          <!-- Q4 left → trackBtnClickCollect  (button 元素) -->
          <line x1="335" y1="510" x2="258" y2="510" stroke="#3ecf8e" stroke-width="1.5" marker-end="url(#arr-g)"/>
          <text x="297" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10">button</text>

          <!-- trackBtn 节点 center(130,510) -->
          <rect x="44" y="483" width="214" height="54" rx="8" fill="#071e14" stroke="#3ecf8e" stroke-width="1.5"/>
          <text x="151" y="499" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="11" font-weight="700">trackBtnClickCollect()</text>
          <text x="151" y="515" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">{ btn_name, btn_label, ...extra }</text>
          <text x="151" y="528" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">普通按钮 · 无需传 btn_type</text>

          <!-- Q4 right → trackLinkClickCollect  (a 链接) -->
          <line x1="525" y1="510" x2="600" y2="510" stroke="#3ecf8e" stroke-width="1.5" marker-end="url(#arr-g)"/>
          <text x="563" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10">a / link</text>

          <!-- trackLink 节点 center(727,510) -->
          <rect x="600" y="483" width="256" height="54" rx="8" fill="#071e14" stroke="#3ecf8e" stroke-width="1.5"/>
          <text x="728" y="499" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="11" font-weight="700">trackLinkClickCollect()</text>
          <text x="728" y="515" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">{ btn_name, btn_label, ...extra }</text>
          <text x="728" y="528" text-anchor="middle" dominant-baseline="central" fill="#34d399" font-size="9">超链接 · 无需传 btn_type</text>

        </svg>